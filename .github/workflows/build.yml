name: Build Distributable Binaries

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller htwg_vpn.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: htwg-vpn-windows
          path: dist/htwg-vpn.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/htwg-vpn.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller htwg_vpn.spec

      - name: Zip app bundle
        run: zip -r htwg-vpn-macos.zip "dist/HTWG VPN.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: htwg-vpn-macos
          path: htwg-vpn-macos.zip

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} htwg-vpn-macos.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libegl1 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb1 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxi6 \
            libxtst6

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller htwg_vpn.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: htwg-vpn-linux
          path: dist/htwg-vpn

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/htwg-vpn
